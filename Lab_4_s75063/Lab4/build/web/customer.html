<html>
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Use JSP Scriplet and JSP Expression in Application</h1>

            <div class="card">

                <h2 class="form-title">Customer Discount</h2>

                <form action="processCustomer.jsp" method="POST">
                    <div class="form-group">
                        <label for="customerCode">Customer Code</label>
                        <input type="text" id="customerCode" name="customerCode" placeholder="Key-in customer code" required><br><br>

                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" name="quantity" placeholder="Key-in quantity" required><br><br>

                        <label>Customer Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="customerType" value="1" checked>Normal Customer</label>
                            <label class="radio-label">
                                <input type="radio" name="customerType" value="2">Privilege Customer</label><br><br>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-submit">Submit</button>
                        <button type="submit" class="btn btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
