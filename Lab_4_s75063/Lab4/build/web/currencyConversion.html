<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class="container">
            <h1>Use JSP Declaration Tag, JSP Scriplet and JSP Expression in Application</h1>

            <div class="card">

                <h2 class="form-title">Customer Conversion</h2>

                <form action="processCurrency.jsp" method="POST">
                    <div class="form-group">

                        <label for="amount">Amount (in RM)</label>
                        <input type="number" id="amount" name="amount" placeholder="[in RM]" required><br><br>

                        <label for="currencyType">Convert to</label>
                        <select id="currencyType" name="currencyType">
                            <option value="1">USD</option>
                            <option value="2">EURO</option>
                            <option value="3">JPY</option>
                            <option value="4">SGD</option>
                        </select>

                        <div class="button-group">
                            <button type="submit" class="btn btn-submit">Submit</button>
                            <button type="submit" class="btn btn-cancel">Cancel</button>

                        </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
